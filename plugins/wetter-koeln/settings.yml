name: Wetter Koeln
id: wetter-koeln-v1
strategy: polling
polling_url: {{ server_url | default: "http://MacBookPro.fritz.box:8000" }}/api/weather
polling_verb: get
refresh_interval: 15
custom_fields:
  - keyname: server_url
    name: Dashboard API URL
    field_type: text
    default: http://MacBookPro.fritz.box:8000
    placeholder: http://hostname:8000
